name: Build iOS IPA

# Artifact usage:
# - Upload cbrain-ios-journal-start.zip to the repository root.
# - Download UNZIP-FIRST-CBrainIOS-installables from the workflow run.
# - Extract the downloaded artifact zip first.
# - For TrollStore, install CBrainIOS.tipa first.
# - Do not install the source zip or the artifact wrapper zip directly.

"on":
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show uploaded files
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Unzip project
        run: |
          mkdir work
          ZIP_FILE="cbrain-ios-journal-start.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Expected $ZIP_FILE in the repository root."
            echo "Upload D:\\codex\\cbrain-ios-journal-start.zip with this exact name."
            exit 1
          fi
          echo "Using zip file: $ZIP_FILE"
          ditto -x -k "$ZIP_FILE" work
          PROJECT_FILE=$(find work -name CBrainIOS.xcodeproj -type d | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "CBrainIOS.xcodeproj not found after unzip."
            find work -maxdepth 4 -type f | sort
            exit 1
          fi
          PROJECT_ROOT=$(dirname "$PROJECT_FILE")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> "$GITHUB_ENV"
          echo "Project root: $PROJECT_ROOT"

      - name: Normalize scripts
        run: |
          cd "$PROJECT_ROOT"
          perl -pi -e 's/\r$//' Scripts/package_ipa.sh
          chmod +x Scripts/package_ipa.sh

      - name: Build IPA
        run: |
          cd "$PROJECT_ROOT"
          bash Scripts/package_ipa.sh
          cp build/ipa/CBrainIOS.ipa "$GITHUB_WORKSPACE/CBrainIOS.ipa"
          cp build/ipa/CBrainIOS.tipa "$GITHUB_WORKSPACE/CBrainIOS.tipa"

      - name: Validate installables
        run: |
          unzip -tq CBrainIOS.ipa "Payload/CBrainIOS.app/Info.plist" >/dev/null
          unzip -tq CBrainIOS.tipa "Payload/CBrainIOS.app/Info.plist" >/dev/null
          unzip -tq CBrainIOS.ipa "Payload/CBrainIOS.app/_CodeSignature/CodeResources" >/dev/null
          unzip -tq CBrainIOS.tipa "Payload/CBrainIOS.app/_CodeSignature/CodeResources" >/dev/null
          echo "CBrainIOS.ipa contents:"
          zipinfo -1 CBrainIOS.ipa | sed -n '1,80p'
          if zipinfo -1 CBrainIOS.ipa | grep -q '\\'; then
            echo "Invalid backslash path found in CBrainIOS.ipa"
            exit 1
          fi
          echo "TrollStore: download UNZIP-FIRST-CBrainIOS-installables, extract it, then install CBrainIOS.tipa."

      - name: Write install notes
        run: |
          cat > README_INSTALL.txt <<'EOF'
          TrollStore install steps:
          1. GitHub downloads this artifact as a zip file.
          2. Extract that zip first.
          3. Install CBrainIOS.tipa from inside the extracted folder.

          Do not install the GitHub artifact zip.
          Do not install the source zip.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: UNZIP-FIRST-CBrainIOS-installables
          path: |
            CBrainIOS.ipa
            CBrainIOS.tipa
            README_INSTALL.txt
